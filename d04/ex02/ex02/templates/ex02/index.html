<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex02 : Premier formulaire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f9f9f9;
            color: #333;
        }
        h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
        h2 { color: #555; margin-top: 30px; }
        .form-section {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px 25px;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        .form-section p { margin: 8px 0; }
        input[type="submit"], button {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
        }
        input[type="submit"]:hover, button:hover { background: #555; }
        .history-section {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px 25px;
            border-radius: 6px;
        }
        .history-entry {
            padding: 6px 10px;
            border-left: 3px solid #aaa;
            margin: 6px 0;
            background: #f5f5f5;
            font-family: monospace;
            font-size: 14px;
        }
        .empty-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

<h1>Ex02 : Premier formulaire</h1>

<!-- FORMULAIRE -->
<div class="form-section">
    <h2>Nouvelle entrée</h2>
    <form method="post" action="/ex02/">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
</div>

<!-- HISTORIQUE -->
<div class="history-section">
    <h2>Historique des entrées</h2>
    {% if history %}
        {% for entry in history %}
            <div class="history-entry">{{ entry }}</div>
        {% endfor %}
    {% else %}
        <p class="empty-msg">Aucune entrée pour le moment.</p>
    {% endif %}
</div>

</body>
</html>
